<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>feliz cumpleaños 🎂</title>
    <audio id="back" src="feli.mp4" loop></audio>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap"
      rel="stylesheet"
    />
    <style>
      #mainTitle {
        font-size: 32px;
        font-family: 'Pixelify Sans', sans-serif;
        margin-bottom: 8px;
      }

      #subTitle {
        font-size: 18px;
        font-family: 'Pixelify Sans', sans-serif;
        color: #555;
      }

      /* Estilo para el botón de activación */
      #startBtn {
        font-family: 'Pixelify Sans', sans-serif;
        font-size: 16px;
        padding: 10px 20px;
        margin-top: 15px;
        cursor: pointer;
        background-color: #ff6b6b;
        color: white;
        border: none;
        border-radius: 8px;
        transition: background 0.2s ease;
      }

      #startBtn:hover {
        background-color: #ff5252;
      }
    </style>
  </head>
  <body>
      <button id="musicBtn"></button>
    <div class="container">
      <div id="birthdayText"></div>
      <button id="startBtn">🎤 Haz clic aquí para activar el micrófono</button>
      <div class="cake-container">
        <div class="cake" id="cake"></div>
      </div>
    </div>

    <script>
      // Read URL params
      const params = new URLSearchParams(window.location.search);
      const name = params.get("name") || "Friend";
      let candleCount = parseInt(params.get("candles")) || 4;
      candleCount = Math.min(Math.max(candleCount, 1), 30);

      const birthdayText = document.getElementById("birthdayText");
      birthdayText.innerHTML = `
        <div id="mainTitle">Happy Birthday, ${name}!</div>
        <div id="subTitle">Pide un deseo y sopla las velas.</div>
      `;

      const cake = document.getElementById("cake");

      const colors = [
        "green-candle",
        "purple-candle",
        "blue-candle",
        "yellow-candle",
      ];
      const CAKE_VISUAL_WIDTH = 35;

      function createCandles(count) {
        cake.innerHTML = "";
        const CANDLE_VISUAL_WIDTH = 2;
        const availableWidth = CAKE_VISUAL_WIDTH;
        const candlesPerRow = 6;
        const shiftAmount = 4;

        for (let i = 0; i < count; i++) {
          const candle = document.createElement("div");
          candle.classList.add("candle");
          const colorClass = colors[Math.floor(Math.random() * colors.length)];
          candle.classList.add(colorClass);

          const row = Math.floor(i / candlesPerRow);
          const col = i % candlesPerRow;
          const totalCandlesInRow = Math.min(
            candlesPerRow,
            count - row * candlesPerRow
          );
          const rowSpacing = availableWidth / (totalCandlesInRow + 1);

          const leftBase = rowSpacing * (col + 1) - CANDLE_VISUAL_WIDTH / 2 + 5;
          const rowShift = row % 2 === 0 ? 0 : shiftAmount;

          candle.style.position = "absolute";
          candle.style.top = `${10 + row * 3}px`;
          candle.style.left = `${leftBase - rowShift + 4}px`;

          cake.appendChild(candle);
        }
      }

      createCandles(candleCount);

      // === Microphone / Blow Detection ===
      let audioContext;
      let blown = false;

      const startBtn = document.getElementById("startBtn");
      startBtn.addEventListener("click", () => {
        startMicDetection();
      });

      async function startMicDetection() {
        try {
          // Solicitar micrófono
          const stream = await navigator.mediaDevices.getUserMedia({
            audio: true,
          });

          // Ocultar el botón una vez otorgado el permiso
          startBtn.style.display = "none";
          document.getElementById("subTitle").textContent = "¡Listo! Sopla fuerte hacia el micrófono.";

          audioContext = new (window.AudioContext || window.webkitAudioContext)();
          
          // Reanudar AudioContext si entra en estado suspendido
          if (audioContext.state === "suspended") {
            await audioContext.resume();
          }

          const source = audioContext.createMediaStreamSource(stream);
          const analyser = audioContext.createAnalyser();
          analyser.fftSize = 256;

          source.connect(analyser);

          const dataArray = new Uint8Array(analyser.frequencyBinCount);

          function detectBlow() {
            if (blown) return;

            analyser.getByteFrequencyData(dataArray);

            // Calcular el volumen promedio (energía sonora)
            let sum = 0;
            for (let i = 0; i < dataArray.length; i++) {
              sum += dataArray[i];
            }
            const averageVolume = sum / dataArray.length;

            // Umbral de volumen (puedes ajustar este valor si se apagan muy fácil o muy difícil)
            const VOLUME_THRESHOLD = 45; 

            if (averageVolume > VOLUME_THRESHOLD) {
              blown = true;
              blowOutCandles();
            } else {
              requestAnimationFrame(detectBlow);
            }
          }

          detectBlow();
        } catch (err) {
          console.error("Mic access error:", err);
          alert("No se pudo acceder al micrófono. Asegúrate de dar permisos y estar en un entorno seguro (http://localhost o https://).");
        }
      }

      function blowOutCandles() {
        const candles = document.querySelectorAll(".candle");
        candles.forEach((candle) => {
          const delay = Math.random() * 1000;
          setTimeout(() => {
            colors.forEach((color) => {
              if (candle.classList.contains(color)) {
                candle.classList.add("blown");
              }
            });
          }, delay);
        });

        // Update subTitle after short delay
        setTimeout(() => {
          const subTitle = document.getElementById("subTitle");
          subTitle.textContent = `Yayy! Wishing you the happiest birthday ever!! 🎉`;
        }, 1200);
      }
    </script>

      <script>
const musicBtn = document.getElementById('musicBtn');
const backAudio = document.getElementById('back');
let isPlaying = false;

musicBtn.addEventListener('click', function() {
  if (!isPlaying) {
    backAudio.play();
    musicBtn.classList.add('playing');
    isPlaying = true;
  } else {
    backAudio.pause();
    musicBtn.classList.remove('playing');
    isPlaying = false;
  }
});
</script>

  </body>
</html>
